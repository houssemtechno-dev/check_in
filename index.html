<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Check-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
      background: #f5f5f5;
    }
    h2 { color: #333; }
    #reader {
      width: 320px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    #result {
      margin-top: 20px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: bold;
      display: none;
    }
    .success { background: #d4edda; color: #155724; display: block; }
    .error   { background: #f8d7da; color: #721c24; display: block; }
    .loading { background: #fff3cd; color: #856404; display: block; }
  </style>
</head>
<body>

<h2>📷 Event Check-In</h2>
<div id="reader"></div>
<div id="result"></div>

<script>
  // ✏️ PASTE YOUR DEPLOYED WEB APP URL HERE
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxxQwZFgka1WAwHhkICs-atYWvVnQ6V9nqCY1Ik5r1yrBZKkH5Qyx6PIkLucuEy7qea/exec";
  const resultDiv = document.getElementById("result");
  let isProcessing = false;
  
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }, false);
  scanner.render(onScanSuccess, () => {});
  
  function showResult(message, type) {
    resultDiv.style.display = "block";
    resultDiv.className = type;
    resultDiv.innerText = message;
  }
  
  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true;
  
    showResult("⏳ Checking in...", "loading");
  
    const callbackName = "cb_" + Date.now();
  
    window[callbackName] = function(data) {
      const msg = data.message;
      if (msg === "Check-in successful") {
        showResult("✅ " + msg, "success");
      } else if (msg === "Already checked in") {
        showResult("⚠️ " + msg, "error");
      } else {
        showResult("❌ " + msg, "error");
      }
      delete window[callbackName];
      document.getElementById(callbackName).remove();
  
      setTimeout(() => {
        resultDiv.style.display = "none";
        resultDiv.className = "";
        isProcessing = false;
      }, 3000);
    };
  
    const script = document.createElement("script");
    script.id = callbackName;
    script.src = GAS_URL + "?id=" + encodeURIComponent(decodedText) + "&callback=" + callbackName;
    document.body.appendChild(script);
  }
  
</script>
</body>
</html>
